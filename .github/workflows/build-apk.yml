name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build-apk:
    runs-on: ubuntu-22.04
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout project
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            autoconf \
            automake \
            build-essential \
            ccache \
            cmake \
            git \
            libarchive-tools \
            libffi-dev \
            libncurses5-dev \
            libncursesw5-dev \
            libssl-dev \
            libtool \
            openjdk-17-jdk \
            pkg-config \
            unzip \
            zip \
            zlib1g-dev

      - name: Install Buildozer
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install buildozer "Cython<3"

      - name: Install Android NDK r25b
        run: |
          mkdir -p "$HOME/.buildozer/android/platform"
          cd "$HOME/.buildozer/android/platform"
          curl -L https://dl.google.com/android/repository/android-ndk-r25b-linux.zip -o android-ndk-r25b-linux.zip
          rm -rf android-ndk-r25b
          bsdtar -xf android-ndk-r25b-linux.zip
          test -x android-ndk-r25b/toolchains/llvm/prebuilt/linux-x86_64/bin/clang

      - name: Build debug APK
        run: |
          set -o pipefail
          buildozer -v android debug 2>&1 | tee buildozer-last.log

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: propiedades-termicas-debug-apk
          path: bin/*.apk
          if-no-files-found: error

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: buildozer-log
          path: buildozer-last.log
          if-no-files-found: ignore
